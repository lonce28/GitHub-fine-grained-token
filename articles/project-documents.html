    <h1>施工资料编制如何与现场进度同步</h1>
    <h2>一、建立资料总台账</h2><p>按单位工程、分部工程、分项工程和施工节点建立资料清单，明确责任人、签字人、完成日期和归档状态。</p>
    <h2>二、用节点倒推资料</h2><p>每完成一个隐蔽、检验批、焊口检测或设备安装节点，应当天收集原始记录，避免后期集中补资料。</p>
    <h2>三、资料复核重点</h2><p>检查日期逻辑、人员签字、编号一致性、检测报告与现场实体对应关系，以及设计变更和签证资料是否进入竣工资料。</p>
