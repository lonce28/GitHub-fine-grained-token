    <h1>管道焊接质量控制的关键检查点</h1>
    <h2>一、焊前检查</h2><p>核查焊工资格、焊接工艺评定、焊材烘干发放记录、坡口加工质量、组对间隙和错边量。</p>
    <h2>二、过程控制</h2><p>重点记录预热温度、层间温度、焊接参数、环境条件和返修情况。遇到风速、湿度、雨雪等不满足要求的情况，应采取防护或暂停作业。</p>
    <h2>三、焊后验收</h2><p>外观检查合格后委托无损检测，并保持焊口编号、焊工编号、检测报告、返修记录之间的一致性。</p>
